// =============================================
// パスワード機能
// =============================================
var PW="iinekanji";
var PW_KEY="kanji_n3_auth";

function renderPasswordScreen(){
  document.getElementById("app").innerHTML=
    "<div style='display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:20px;'>"+
    "<div style='font-size:2.5rem;'>🔒</div>"+
    "<div style='font-size:1.2rem;font-weight:bold;color:#1a3a5c;'>パスワードを入力してください</div>"+
    "<div style='font-size:0.9rem;color:#666;'>Masukkan password</div>"+
    "<input id='pw-input' type='password' placeholder='パスワード' style='padding:12px 20px;font-size:1rem;border:2px solid #ccc;border-radius:12px;outline:none;text-align:center;width:220px;' onkeydown='pwKeyHandler(event)' />"+
    "<button onclick='checkPassword()' style='padding:12px 40px;background:#1a3a5c;color:#fff;border:none;border-radius:12px;font-size:1rem;cursor:pointer;'>入る</button>"+
    "<div id='pw-error' style='color:#c0392b;font-size:0.9rem;min-height:1.2em;'></div>"+
    "</div>";
  setTimeout(function(){var el=document.getElementById("pw-input");if(el)el.focus();},100);
}
function pwKeyHandler(e){if(e.key==="Enter")checkPassword();}
function checkPassword(){
  var input=document.getElementById("pw-input").value;
  if(input===PW){
    localStorage.setItem(PW_KEY,"1");
    renderWeekMenu();
  }else{
    document.getElementById("pw-error").textContent="パスワードが違います。Salah kata sandi.";
    document.getElementById("pw-input").value="";
    document.getElementById("pw-input").focus();
  }
}

// =============================================
// 進捗保存
// =============================================
var PROG_KEY="kanji_n3_progress";
function loadProgress(){try{return JSON.parse(localStorage.getItem(PROG_KEY))||{};}catch(e){return {};}}
function saveProgress(week,day,score,total){
  var p=loadProgress();
  if(!p[week])p[week]={};
  var prev=p[week][day];
  if(!prev||score/total>=prev.score/prev.total){
    p[week][day]={score:score,total:total,date:new Date().toLocaleDateString("ja-JP")};
  }
  try{localStorage.setItem(PROG_KEY,JSON.stringify(p));}catch(e){}
}
function getProgress(week,day){var p=loadProgress();return (p[week]&&p[week][day])?p[week][day]:null;}

// =============================================
// 間違い保存・復習
// =============================================
var WRONG_KEY="kanji_n3_wrong";
var isReviewMode=false;
function loadWrong(){try{return JSON.parse(localStorage.getItem(WRONG_KEY))||{};}catch(e){return {};}}
function saveWrong(week,day,q){
  var w=loadWrong();
  var key=week+"-"+day;
  if(!w[key])w[key]=[];
  var exists=w[key].some(function(x){return x.q===q.q&&x.type===q.type;});
  if(!exists)w[key].push(q);
  try{localStorage.setItem(WRONG_KEY,JSON.stringify(w));}catch(e){}
}
function getWrongQuestions(week,day){var w=loadWrong();return w[week+"-"+day]||[];}
function clearWrong(week,day){var w=loadWrong();delete w[week+"-"+day];try{localStorage.setItem(WRONG_KEY,JSON.stringify(w));}catch(e){}}
function clearWrongAll(week){var w=loadWrong();Object.keys(w).forEach(function(k){if(k.indexOf(week+"-")===0)delete w[k];});try{localStorage.setItem(WRONG_KEY,JSON.stringify(w));}catch(e){}}
function startReview(week,day){
  var wq=getWrongQuestions(week,day);
  if(wq.length===0){alert("間違えた問題はありません！");return;}
  currentWeek=week;currentDay=day;mode="all";
  ql=shu(wq.slice());cur=0;sc=0;hist=[];
  isReviewMode=true;
  renderQuiz();
}
function resetWeek(week){
  if(!confirm("この週の間違いをすべてリセットしますか？\nReset semua kesalahan minggu ini?"))return;
  clearWrongAll(week);
  renderDayMenu();
}

var FOK=["正解！Benar!","素晴らしい！Bagus sekali!","その通り！Tepat sekali!"];
var FNG=["不正解。Salah.","残念！Sayang sekali.","もう一度。Coba lagi."];

var currentWeek=null, currentDay=null, mode="all", ql=[], cur=0, sc=0, hist=[];

function shu(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function getQuestions(){
  var src=WEEKS[currentWeek].days[currentDay].questions;
  return shu(mode==="all"?src:src.filter(function(q){return q.type===mode;}));
}
function setMode(m){mode=m;cur=0;sc=0;hist=[];ql=getQuestions();renderQuiz();}
function next(){cur++;renderQuiz();}
function back(){if(cur>0){cur--;renderQuiz();}}
function restart(){cur=0;sc=0;hist=[];ql=getQuestions();renderQuiz();}
function goHome(){currentWeek=null;currentDay=null;mode="all";renderWeekMenu();}
function goDayMenu(){currentDay=null;mode="all";renderDayMenu();}

function selectWeek(w){
  if(!WEEKS[w])return;
  currentWeek=w;currentDay=null;mode="all";
  renderDayMenu();
}
function selectDay(d){
  currentDay=d;mode="all";cur=0;sc=0;hist=[];
  ql=getQuestions();renderQuiz();
}

function answer(i){
  if(hist[cur]&&hist[cur].chosen!==null)return;
  var q=ql[cur];var ok=i===q.ans;
  if(ok)sc++;
  hist[cur]={chosen:i,correct:ok};
  if(!ok&&!isReviewMode)saveWrong(currentWeek,currentDay,q);
  renderAnswered(q,i,ok);
}
function renderAnswered(q,chosen,ok){
  document.querySelectorAll(".cb").forEach(function(b){b.disabled=true;});
  document.getElementById("b"+chosen).classList.add(ok?"ok":"ng");
  if(!ok)document.getElementById("b"+q.ans).classList.add("rv");
  var fb=document.getElementById("fb");
  fb.className="fb "+(ok?"ok":"ng");
  var msg=(ok?"⭕ ":"❌ ")+rnd(ok?FOK:FNG)+(ok?"":"<br>正解："+q.ch[q.ans]);
  if(q.mean&&(q.type==="vocab"||q.type==="reading"||q.type==="kanji"))msg+="<br><span style='font-size:13px;opacity:.85'>意味 / Arti: "+q.mean+"</span>";
  fb.innerHTML=msg;fb.style.display="block";
}

function renderWeekMenu(){
  var html="<div class='menu-screen'>";
  html+="<h1>日本語総まとめ N3 漢字</h1>";
  html+="<p>週を選んでください / Pilih minggu</p>";
  html+="<div class='week-cards'>";
  WEEK_ORDER.forEach(function(w){
    var wdata=WEEKS[w];
    if(wdata){
      var cnt=WEEK_DAY_ORDER[w]?WEEK_DAY_ORDER[w].length:0;
      html+="<div class='week-card' data-w='"+w+"' onclick='selectWeek(this.dataset.w)'>";
      html+="<div class='wc-num'>"+wdata.label.replace("第","").replace("週","")+"</div>";
      html+="<div class='wc-title'>"+wdata.label+"</div>";
      html+="<div style='font-size:11px;color:#888'>"+wdata.topic+"</div>";
      html+="<div class='wc-count'>"+cnt+"日分</div></div>";
    } else {
      html+="<div class='week-card empty'>";
      html+="<div class='wc-num' style='color:#ccc'>"+(WEEK_ORDER.indexOf(w)+1)+"</div>";
      html+="<div class='wc-title' style='color:#ccc'>第"+(WEEK_ORDER.indexOf(w)+1)+"週</div>";
      html+="<div class='wc-count' style='background:#eee;color:#ccc'>準備中</div></div>";
    }
  });
  html+="</div></div>";
  document.getElementById("app").innerHTML=html;
}

function renderDayMenu(){
  var wdata=WEEKS[currentWeek];
  var dayKeys=WEEK_DAY_ORDER[currentWeek];
  var html="<div class='menu-screen'>";
  html+="<div class='breadcrumb'><span onclick='goHome()'>🏠 ホーム</span> › "+wdata.label+"</div>";
  html+="<h1>"+wdata.label+" れんしゅう</h1>";
  html+="<p>日を選んでください / Pilih hari</p>";
  html+="<div class='day-cards'>";
  dayKeys.forEach(function(d){
    var day=wdata.days[d];
    var num=d.match(/\d+$/)[0];
    var prog=getProgress(currentWeek,d);
    var wrongQ=getWrongQuestions(currentWeek,d);
    var hasWrong=wrongQ.length>0;
    html+="<div class='day-card"+(hasWrong?" has-wrong":"")+"' data-d='"+d+"' onclick='selectDay(this.dataset.d)'>";
    html+="<div class='dc-num'>"+num+"</div>";
    html+="<div class='dc-title'>"+num+"日目</div>";
    html+="<div class='dc-sub'>"+day.topic+"</div>";
    html+="<div class='dc-count'>"+day.questions.length+"問</div>";
    if(prog)html+="<div style='font-size:10px;color:#1D9E75;margin-top:3px;font-weight:600'>✓ "+prog.score+"/"+prog.total+" ("+Math.round(prog.score/prog.total*100)+"%)</div>";
    if(hasWrong)html+="<div class='dc-wrong'>❌ "+wrongQ.length+"問 復習 <span class='rst-day' data-w='"+currentWeek+"' data-d='"+d+"' title='リセット' style='cursor:pointer;margin-left:4px;color:#999;'>🗑</span></div>";
    html+="</div>";
  });
  html+="</div>";
  var hasAnyWrong=dayKeys.some(function(d){return getWrongQuestions(currentWeek,d).length>0;});
  if(hasAnyWrong){
    html+="<div style='margin-top:16px;text-align:center'>";
    html+="<button onclick='resetWeek(currentWeek)' style='padding:8px 18px;border:1.5px solid #E24B4A;border-radius:10px;color:#E24B4A;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;'>🗑 この週の間違いをすべてリセット</button>";
    html+="</div>";
  }
  html+="</div>";
  document.getElementById("app").innerHTML=html;
  document.querySelectorAll(".rst-day").forEach(function(el){
    el.addEventListener("click",function(e){
      e.stopPropagation();
      var w=el.dataset.w,d=el.dataset.d;
      if(confirm("この日の間違いリストをリセットしますか？\nReset daftar kesalahan hari ini?")){
        clearWrong(w,d);renderDayMenu();
      }
    });
  });
}

function renderQuiz(){
  var app=document.getElementById("app");
  if(cur>=ql.length){renderScore(app);return;}
  var q=ql[cur];
  var wdata=WEEKS[currentWeek];
  var daydata=wdata.days[currentDay];
  var dayNum=currentDay.match(/\d+$/)[0];
  var pct=(cur/ql.length*100).toFixed(0);
  var LT=["a","b","c","d"];
  var visibleTabs=dayNum==="7"?TABS.filter(function(t){return t.k!=="vocab";}):TABS;
  var tabsH=visibleTabs.map(function(t){var on=mode===t.k?" on":"";return "<button class=\'tab"+on+"\' data-k=\'"+t.k+"\' onclick=\'setMode(this.dataset.k)\'>"+t.l+"</button>";}).join("");
  var isV=q.type==="vocab";
  var qH=isV
    ?"<span class='kbig'>"+q.q+"</span><span style='font-size:14px;color:#666;display:inline-block'>読み方は？/ Bagaimana cara bacanya?</span>"
    :q.q.replace(/\n/g,"<br>")+(q.sub?"<div class='sub-hint'>"+q.sub+"</div>":"");
  var backBtn=cur>0?"<button class='bck' onclick='back()'>← 前の問題</button>":"<span></span>";
  var nxtLbl=cur+1<ql.length?"次の問題へ →":"結果を見る →";
  var choicesH=q.ch.map(function(c,i){return "<button class='cb' id='b"+i+"' onclick='answer("+i+")'><span class='cl'>"+LT[i]+".</span><span>"+c+"</span></button>";}).join("");
  app.innerHTML=
    "<div class='hdr'>"+
      "<div>"+
        "<div class='ttl'>"+wdata.label+" "+dayNum+"日目 れんしゅう</div>"+
        "<div class='ttl-sub'>Soal "+(cur+1)+" / "+ql.length+" &nbsp;·&nbsp; "+
          "<span class='home-link' onclick='goHome()'>🏠 ホーム</span> / "+
          "<span class='home-link' onclick='goDayMenu()'>← 日選択</span>"+
        "</div>"+
      "</div>"+
      "<div class='tabs'>"+tabsH+"</div>"+
    "</div>"+
    "<div class='pbw'><div class='pbf' style='width:"+pct+"%'></div></div>"+
    "<div class='badge'>"+q.lbl+"</div>"+
    "<div class='qn'>問 "+(cur+1)+"</div>"+
    "<div class='q'>"+qH+"</div>"+
    "<div class='choices'>"+choicesH+"</div>"+
    "<div class='fb' id='fb'></div>"+
    "<div style='display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:4px'>"+
      backBtn+
      "<button class='nxt' onclick='next()'>"+nxtLbl+"</button>"+
    "</div>";
  var h=hist[cur];
  if(h&&h.chosen!==null)renderAnswered(q,h.chosen,h.correct);
}

function renderScore(app){
  var pct=Math.round(sc/ql.length*100);
  var msg=pct>=80?"素晴らしい！Luar biasa! 🎉":pct>=60?"よくできました。Cukup bagus!":"もっと練習しましょう。Perlu latihan lagi.";
  var wdata=WEEKS[currentWeek];
  var dayNum=currentDay.match(/\d+$/)[0];
  var wrongCount=ql.length-sc;
  if(!isReviewMode)saveProgress(currentWeek,currentDay,sc,ql.length);
  var reviewBtn=wrongCount>0
    ?"<button class='rbtn rev' onclick='startReview(currentWeek,currentDay)'>🔁 間違い復習 ("+wrongCount+"問)</button>"
    :"<button class='rbtn' style='background:#1D9E75;cursor:default' disabled>✅ 全問正解！</button>";
  if(isReviewMode){isReviewMode=false;if(wrongCount===0)clearWrong(currentWeek,currentDay);}
  app.innerHTML=
    "<div class='sc'>"+
    "<div class='snum'>"+sc+"/"+ql.length+"</div>"+
    "<div class='slbl'>"+msg+"</div>"+
    "<div class='srow'>"+
      "<div class='scard'><div class='sn' style='color:#1D9E75'>"+sc+"</div><div class='sl'>正解 / Benar</div></div>"+
      "<div class='scard'><div class='sn' style='color:#E24B4A'>"+wrongCount+"</div><div class='sl'>不正解 / Salah</div></div>"+
      "<div class='scard'><div class='sn' style='color:#185FA5'>"+pct+"%</div><div class='sl'>正答率 / Skor</div></div>"+
    "</div>"+
    "<div class='btn-row'>"+
      reviewBtn+
      "<button class='rbtn' onclick='restart()'>もう一度 / Ulangi</button>"+
      "<button class='mbtn' onclick='goDayMenu()'>← "+wdata.label+"の日選択</button>"+
      "<button class='mbtn' onclick='goHome()'>🏠 ホーム</button>"+
    "</div></div>";
}

if(localStorage.getItem(PW_KEY)==="1"){
  renderWeekMenu();
}else{
  renderPasswordScreen();
}
</script>
